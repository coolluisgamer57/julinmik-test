<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Math puzzle</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
    }

    /* top-right rotated faint text */
    .top-right {
      position: absolute;
      top: 20px;
      right: 20px;
      transform: rotate(29deg);
      opacity: 0.4;
      font-size: 18px;
      pointer-events: none;
    }

    /* center container */
    .center {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    img {
      max-width: 300px;
      border: 2px solid white;
    }

    .bottom-text {
      margin-top: 15px;
      font-size: 18px;
    }
  </style>
</head>
<body>

  <div class="top-right">
    1110896___6
  </div>

  <div class="center">
    <img src="https://i.ibb.co.com/zVR2m1Ck/Screenshot-2026-06-14-152028.png" alt="center image">
    <div class="bottom-text">Math class is gonna be important for this</div>
  </div>

</body>
</html>
