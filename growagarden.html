<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Centered Layout</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: black;
      font-family: Arial, sans-serif;
      position: relative;
    }

    .top-text {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 24px;
      text-align: center;
    }

    .bottom-text {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 20px;
      text-align: center;
    }

    .center-image {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      max-width: 300px;
      height: auto;
    }
  </style>
</head>
<body>

  <div class="top-text">I love my pencil sharpener</div>

  <img class="center-image" src="your-image.jpg" alt="Centered Image">
    "https://ibb.co.com/7dFgF4Qc"  
  <div class="bottom-text">i wonder if you also can SHARPEN something else??</div>

</body>
</html>
