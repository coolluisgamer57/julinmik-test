<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centered Image</title>

<style>
    body {
        margin: 0;
        background-color: black;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        font-family: Arial, sans-serif;
        color: white;
    }

    .center-image {
        width: 300px; /* Change size if needed */
        height: auto;
    }

    .bottom-text {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 24px;
        text-align: center;
    }
</style>
</head>
<body>
                                                                      
<img class="center-image" src="https://i.ibb.co.com/fzhpBYgP/Screenshot-2026-06-15-225709.png" alt="Center Image">

<div class="bottom-text">
    The real last one
</div>

</body>
</html>
