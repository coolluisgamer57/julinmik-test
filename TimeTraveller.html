<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Layout Page</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background-color: black;
      font-family: Arial, sans-serif;
      color: white;
    }

    /* top center text */
    .top-text {
      position: absolute;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 20px;
    }

    /* center image */
    .center {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    img {
      max-width: 300px;
      border: 2px solid white;
    }
  </style>
</head>
<body>

  <div class="top-text">Julinmik.html</div>

  <div class="center">
    <img src="https://th.bing.com/th/id/OIP.M0jJePz0aCxAvaxqntLjLgHaK1?w=128&h=188&c=7&r=0&o=7&dpr=1.5&pid=1.7&rm=3" alt="center image">
  </div>

</body>
</html>
